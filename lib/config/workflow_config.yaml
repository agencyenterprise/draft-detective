# Workflow Configuration
# Default configuration for document analysis workflows.
# Customize these settings for your organization's needs.

workflows:
  # Preface/Introduction Section Analysis
  about_this:
    section_headers:
      - "About This"
      - "Preface"
      - "Introduction"
      - "Executive Summary"

    requirements:
      context:
        name: "Establishes Context"
        short_name: "Context"
        description: "Does the section establish the context for the study?"
        level: "sentence"
        prompt: >-
          Does the section establish the context that prompted the study?
          Look for sentences explaining WHY this work was undertaken.
      objectives:
        name: "Explains Objectives"
        short_name: "Objectives"
        description: "Does the section explain the objectives?"
        level: "sentence"
        prompt: >-
          Does the section explain the publication's objectives?
          Look for sentences stating WHAT this publication aims to achieve.
      audience:
        name: "Identifies Audience"
        short_name: "Audience"
        description: "Does the section identify the intended audience?"
        level: "sentence"
        prompt: >-
          Does the section identify the intended audience?
          Look for sentences specifying WHO this publication is for.

  # Author Biography Analysis
  about_authors:
    expected_sentence_count: 3

    rules:
      rule_1_sentence_length:
        name: "Sentence Count"
        short_name: "Length"
        description: "Bio should be concise"
      rule_2_position_affiliation:
        name: "Position & Affiliation"
        short_name: "Position"
        description: "Should include position and affiliation"
        prompt: >-
          Does the author description contain position and affiliation?

          Respond with passed=true if present, passed=false otherwise.

          Author description:
          {author_text}
      rule_3_research_focus:
        name: "Research Focus"
        short_name: "Focus"
        description: "Should include research focus"
        prompt: >-
          Does the author description contain a research focus?

          Respond with passed=true if present, passed=false otherwise.

          Author description:
          {author_text}

    abbreviations:
      - "Ph.D."
      - "M.D."
      - "J.D."
      - "M.S."
      - "B.S."
      - "M.A."
      - "B.A."
      - "Dr."
      - "Mr."
      - "Ms."
      - "e.g."
      - "i.e."
      - "etc."

  # Advocacy and Tone Detection
  advocacy_tone:
    subjectivity_threshold: 0.75
    context_k: 2

    trigger_words:
      - "law"
      - "regulation"
      - "compliance"
      - "policy"
      - "liability"
      - "penalty"
      - "enforcement"

    advocacy_patterns:
      - "\\bwe should\\b"
      - "\\bwe must\\b"
      - "\\bmust ensure\\b"
      - "\\bneed to\\b"
      - "\\brecommend that\\b"
      - "\\bcall for\\b"
      - "\\bshould be adopted\\b"

    ignored_section_keywords:
      - "author"
      - "reference"
      - "bibliography"
      - "appendix"
      - "acknowledgment"

    check_types:
      trigger_words:
        description: "potentially sensitive language"
        definitions: >-
          Language that may require review before publication, such as
          legal terms, compliance language, or liability-related phrases.
      advocacy_language:
        description: "normative or prescriptive language"
        definitions: >-
          Language that promotes a position or calls for action without
          supporting evidence. Look for "should", "must", "need to" statements.
      subjective_tone:
        description: "subjective or biased language"
        definitions: >-
          Judgments, opinions, or emotionally loaded language that goes
          beyond neutral reporting. Look for evaluative words and emotive terms.
