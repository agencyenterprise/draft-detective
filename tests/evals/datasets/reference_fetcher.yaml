dataset:
  name: "Reference Fetcher Dataset"
  description: "Test cases for fetching reference sources via web search"
  test_config:
    strict_fields:
      - reference_details
      - final_conclusion
      # TODO: there's multiple source and download urls for the same reference, so tests are not deterministic
      # we need a way to allow multiple expected possible values (similar to "anyOf: [value1, value2, value3, ...]")
      # - source_url
      # - download_url # TODO: there's multiple download urls for the same reference, so tests are not deterministic
    llm_fields: []
  items:
    - name: "ref_fetcher_rand_article_with_pdf"
      description: "RAND article should include the download URL pointing to the PDF"
      input:
        reference: "Ablon, Lillian, and Andy Bogart, Zero Days, Thousands of Nights: The Life and Times of Zero-Day Vulnerabilities and Their Exploits, RAND Corporation, RR-1751-RC, 2017. As of February 15, 2024: https://www.rand.org/pubs/research_reports/RR1751.html"
      expected_output:
        reference_details: "Ablon, Lillian, and Andy Bogart, Zero Days, Thousands of Nights: The Life and Times of Zero-Day Vulnerabilities and Their Exploits, RAND Corporation, RR-1751-RC, 2017. As of February 15, 2024: https://www.rand.org/pubs/research_reports/RR1751.html"
        reasoning: ""
        source_url: "https://www.rand.org/pubs/research_reports/RR1751.html"
        file_id: null
        failed_file_ids: []
        final_conclusion: "source_found"

    - name: "ref_fetcher_science_article_paywall_alternatives"
      description: "Science article usually behind a paywall but has alternative links with downloadable PDFs"
      input:
        reference: 'Bistline, John, Geoffrey Blanford, Maxwell Brown, Dallas Burtraw, Maya Domeshek, Jamil Farbes, Allen Fawcett, Anne Hamilton, Jesse Jenkins, Ryan Jones, et al., "Emissions and Energy Impacts of the Inflation Reduction Act," Science, Vol. 380, No. 6652, June 30, 2023.'
      expected_output:
        reference_details: 'Bistline, John, Geoffrey Blanford, Maxwell Brown, Dallas Burtraw, Maya Domeshek, Jamil Farbes, Allen Fawcett, Anne Hamilton, Jesse Jenkins, Ryan Jones, et al., "Emissions and Energy Impacts of the Inflation Reduction Act," Science, Vol. 380, No. 6652, June 30, 2023.'
        reasoning: "https://pmc.ncbi.nlm.nih.gov/articles/PMC10336889/pdf"
        source_url: "https://www.science.org/doi/10.1126/science.adg3781"
        file_id: null
        failed_file_ids: []
        # download_url: "https://arxiv.org/pdf/2307.01443.pdf"
        final_conclusion: "source_found"

    - name: "ref_fetcher_government_material"
      description: "Government material should be publicly accessible"
      input:
        reference: "North American Electric Reliability Corporation, 2024 Long-Term Reliability Assessment, December 2024."
      expected_output:
        reference_details: "North American Electric Reliability Corporation, 2024 Long-Term Reliability Assessment, December 2024."
        reasoning: ""
        source_url: "https://www.nerc.com/pa/RAPA/ra/Reliability%20Assessments%20DL/NERC_Long%20Term%20Reliability%20Assessment_2024.pdf"
        file_id: null
        failed_file_ids: []
        # download_url: "https://www.nerc.com/pa/RAPA/ra/Reliability%20Assessments%20DL/NERC_Long%20Term%20Reliability%20Assessment_2024.pdf"
        final_conclusion: "source_found"

    - name: "ref_fetcher_statista_research_paywall"
      description: "Statista research behind paywall"
      input:
        reference: 'Statista, "Number of Artificial Intelligence Tool Users Worldwide from 2020 to 2031," August 15, 2025. As of December 18, 2024: https://www.statista.com/forecasts/1449844/ai-tool-users-worldwide'
      expected_output:
        reference_details: 'Statista, "Number of Artificial Intelligence Tool Users Worldwide from 2020 to 2031," August 15, 2025. As of December 18, 2024: https://www.statista.com/forecasts/1449844/ai-tool-users-worldwide'
        reasoning: ""
        source_url: "https://www.statista.com/forecasts/1449844/ai-tool-users-worldwide"
        file_id: null
        failed_file_ids: []
        # download_url: null
        final_conclusion: "source_found_but_not_accessible"

    - name: "ref_fetcher_anthropic_html_content"
      description: "Full content in HTML page"
      input:
        reference: 'Anthropic, "Anthropic''s Responsible Scaling Policy," company announcement, September 19, 2023'
      expected_output:
        reference_details: 'Anthropic, "Anthropic''s Responsible Scaling Policy," company announcement, September 19, 2023'
        reasoning: ""
        source_url: "https://www.anthropic.com/news/anthropics-responsible-scaling-policy"
        file_id: null
        failed_file_ids: []
        # download_url: "https://www-cdn.anthropic.com/1adf000c8f675958c2ee23805d91aaade1cd4613/responsible-scaling-policy.pdf"
        final_conclusion: "source_found"

    - name: "ref_fetcher_oreilly_book_multiple_pages"
      description: "Full content split across multiple HTML pages (no single download url)"
      input:
        reference: "Adkins, Heather, Betsy Beyer, Paul Blankinship, Piotr Lewandowski, Ana Oprea, and Adam Stubblefield, Building Secure and Reliable Systems: Best Practices for Designing, Implementing, and Maintaining Systems, O'Reilly, 2020"
      expected_output:
        reference_details: "Adkins, Heather, Betsy Beyer, Paul Blankinship, Piotr Lewandowski, Ana Oprea, and Adam Stubblefield, Building Secure and Reliable Systems: Best Practices for Designing, Implementing, and Maintaining Systems, O'Reilly, 2020"
        reasoning: "Full content is split across multiple HTML pages (no single download url)"
        source_url: "https://google.github.io/building-secure-and-reliable-systems/raw/toc.html"
        file_id: null
        failed_file_ids: []
        # download_url: null
        final_conclusion: "source_found_but_not_accessible"
