dataset:
  name: "Reference Validator Dataset"
  description: "Test cases for validating bibliography references via web presence"
  test_config:
    # Strictly compare stable scalars only
    strict_fields:
      - original_reference
      - final_result
    # Let the LLM semantically compare nested validations and suggested actions
    llm_fields:
      - suggested_action
      # - bibliography_field_validations:
      #     - category
      #     - problem_type
      #     - current_value
      #     - suggested_value
  items:
    - name: "valid_rand_report"
      description: "Known RAND report should validate as correct"
      input:
        reference: "Goodison, Sean E., Robert C. Davis, and Brian A. Jackson. Digital Evidence and the U.S. Criminal Justice System: Identifying Technology and Other Needs to More Effectively Acquire and Utilize Digital Evidence. Santa Monica, CA: RAND Corporation, 2015."
      expected_output:
        original_reference: "Goodison, Sean E., Robert C. Davis, and Brian A. Jackson. Digital Evidence and the U.S. Criminal Justice System: Identifying Technology and Other Needs to More Effectively Acquire and Utilize Digital Evidence. Santa Monica, CA: RAND Corporation, 2015."
        final_result: valid
        bibliography_field_validations:
          - category: author
            current_value: "Sean E. Goodison; Robert C. Davis; Brian A. Jackson"
            suggested_value: "Sean E. Goodison; Robert C. Davis; Brian A. Jackson"
            problem_type: correct
          - category: title
            current_value: "Digital Evidence and the U.S. Criminal Justice System: Identifying Technology and Other Needs to More Effectively Acquire and Utilize Digital Evidence"
            suggested_value: "Digital Evidence and the U.S. Criminal Justice System: Identifying Technology and Other Needs to More Effectively Acquire and Utilize Digital Evidence"
            problem_type: correct
          - category: publisher
            current_value: "RAND Corporation"
            suggested_value: "RAND Corporation"
            problem_type: correct
          - category: year
            current_value: "2015"
            suggested_value: "2015"
            problem_type: correct
        suggested_action: "No changes needed."
        url: "https://www.rand.org/pubs/research_reports/RR890.html"

    - name: "invalid_fabricated_reference"
      description: "Fabricated journal article should be flagged as invalid with corrective guidance"
      input:
        reference: "Doe, John. The Effects of Widgets on Gadgets. Journal of Widgetry, 2020."
      expected_output:
        original_reference: "Doe, John. The Effects of Widgets on Gadgets. Journal of Widgetry, 2020."
        final_result: not_found
        bibliography_field_validations:
          - category: author
            current_value: "John Doe"
            suggested_value: ""
            problem_type: incorrect
          - category: title
            current_value: "The Effects of Widgets on Gadgets"
            suggested_value: ""
            problem_type: incorrect
          - category: publisher
            current_value: "Journal of Widgetry"
            suggested_value: ""
            problem_type: incorrect
          - category: year
            current_value: "2020"
            suggested_value: ""
            problem_type: incorrect
        suggested_action: "Replace this fabricated reference with a real, verifiable source or remove it."
        url: ""

    - name: "wrong_year_known_source"
      description: "Known RAND report with incorrect year should be partially corrected and marked invalid"
      input:
        reference: "Vermeer, Michael J. D., Dulani Woods, and Brian A. Jackson. Identifying Law Enforcement Needs for Access to Digital Evidence in Remote Data Centers. Santa Monica, CA: RAND Corporation, 2019."
      expected_output:
        original_reference: "Vermeer, Michael J. D., Dulani Woods, and Brian A. Jackson. Identifying Law Enforcement Needs for Access to Digital Evidence in Remote Data Centers. Santa Monica, CA: RAND Corporation, 2019."
        final_result: found_with_inconsistencies
