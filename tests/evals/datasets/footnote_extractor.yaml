# Footnote Extractor Test Dataset
# This file contains test cases for the footnote extractor agent
# The agent extracts structured footnotes from footnote section text

dataset:
  name: "Footnote Extractor Dataset"
  description: "Test cases for validating footnote extraction from document footnote sections"
  test_config:
    # Strictly compare stable fields
    strict_fields:
      footnotes:
        __all__:
          - marker
          - reference_code
    # Let the LLM semantically compare text content
    llm_fields:
      footnotes:
        __all__:
          - text
    llm_instructions: "The text field should contain the full footnote content with marker and reference code removed. Minor formatting differences (whitespace, punctuation) are acceptable."

  items:
    # Basic Cases
    - name: "basic_single_footnote_with_ref"
      description: "Test extraction of a single footnote with reference code"
      input:
        text: |
          18. Bistline et al., "Emissions and Energy Impacts of the Inflation Reduction Act"; North American Electric Reliability Corporation (NERC), 2024 Long-Term Reliability Assessment; Pilz, Mahmood, and Heim, AI's Power Requirements Under Exponential Growth. [↑](#footnote-ref-18)
      expected_output:
        footnotes:
          - marker: "18"
            text: "Bistline et al., \"Emissions and Energy Impacts of the Inflation Reduction Act\"; North American Electric Reliability Corporation (NERC), 2024 Long-Term Reliability Assessment; Pilz, Mahmood, and Heim, AI's Power Requirements Under Exponential Growth."
            reference_code: "#footnote-ref-18"

    - name: "basic_multiple_footnotes"
      description: "Test extraction of multiple footnotes in sequence"
      input:
        text: |
          18. Bistline et al., "Emissions and Energy Impacts of the Inflation Reduction Act"; North American Electric Reliability Corporation (NERC), 2024 Long-Term Reliability Assessment; Pilz, Mahmood, and Heim, AI's Power Requirements Under Exponential Growth. [↑](#footnote-ref-18)
          19. Srivathsan et al., "AI Power"; Scharre, Future-Proofing Frontier AI Regulation. [↑](#footnote-ref-19)
          20. Secretary of Energy Advisory Board, "Recommendations on Powering Artificial Intelligence and Data Center Infrastructure." [↑](#footnote-ref-20)
      expected_output:
        footnotes:
          - marker: "18"
            text: "Bistline et al., \"Emissions and Energy Impacts of the Inflation Reduction Act\"; North American Electric Reliability Corporation (NERC), 2024 Long-Term Reliability Assessment; Pilz, Mahmood, and Heim, AI's Power Requirements Under Exponential Growth."
            reference_code: "#footnote-ref-18"
          - marker: "19"
            text: "Srivathsan et al., \"AI Power\"; Scharre, Future-Proofing Frontier AI Regulation."
            reference_code: "#footnote-ref-19"
          - marker: "20"
            text: "Secretary of Energy Advisory Board, \"Recommendations on Powering Artificial Intelligence and Data Center Infrastructure.\""
            reference_code: "#footnote-ref-20"

    - name: "footnote_without_reference_code"
      description: "Test extraction of footnote without reference code"
      input:
        text: |
          1. This is a simple footnote without any reference code.
          2. Another footnote example.
      expected_output:
        footnotes:
          - marker: "1"
            text: "This is a simple footnote without any reference code."
            reference_code: null
          - marker: "2"
            text: "Another footnote example."
            reference_code: null

    - name: "footnote_bracketed_format"
      description: "Test extraction of footnote in bracketed format [N]"
      input:
        text: |
          [1] This is a footnote in bracketed format.
          [2] Another bracketed footnote with reference. [↑](#footnote-ref-2)
      expected_output:
        footnotes:
          - marker: "1"
            text: "This is a footnote in bracketed format."
            reference_code: null
          - marker: "2"
            text: "Another bracketed footnote with reference."
            reference_code: "#footnote-ref-2"

    - name: "footnote_caret_format"
      description: "Test extraction of footnote in caret format ^N"
      input:
        text: |
          ^1 This is a footnote in caret format.
          ^2 Another caret footnote. [↑](#footnote-ref-2)
      expected_output:
        footnotes:
          - marker: "1"
            text: "This is a footnote in caret format."
            reference_code: null
          - marker: "2"
            text: "Another caret footnote."
            reference_code: "#footnote-ref-2"

    - name: "footnote_multiline"
      description: "Test extraction of footnote spanning multiple lines"
      input:
        text: |
          107. This is a footnote that spans
          multiple lines and should be merged
          into a single entry. [↑](#footnote-ref-107)
      expected_output:
        footnotes:
          - marker: "107"
            text: "This is a footnote that spans multiple lines and should be merged into a single entry."
            reference_code: "#footnote-ref-107"

    - name: "real_world_power_capacity_example"
      description: "Test with real-world footnotes from power capacity document"
      input:
        text: |
          18. Bistline et al., "Emissions and Energy Impacts of the Inflation Reduction Act"; North American Electric Reliability Corporation (NERC), 2024 Long-Term Reliability Assessment; Pilz, Mahmood, and Heim, AI's Power Requirements Under Exponential Growth. [↑](#footnote-ref-18)
          19. Srivathsan et al., "AI Power"; Scharre, Future-Proofing Frontier AI Regulation. [↑](#footnote-ref-19)
          20. Secretary of Energy Advisory Board, "Recommendations on Powering Artificial Intelligence and Data Center Infrastructure." [↑](#footnote-ref-20)
          21. Sevilla et al., "Can AI Scaling Continue Through 2030?" [↑](#footnote-ref-21)
          22. Pilz, Mahmood, and Heim, AI's Power Requirements Under Exponential Growth. [↑](#footnote-ref-22)
          23. Shehabi et al., 2024 United States Data Center Energy Usage Report. [↑](#footnote-ref-23)
          24. LNBL assumed an average capacity utilization rate of 50 percent to translate energy (TWh) to capacity (GW). [↑](#footnote-ref-24)
          25. Davenport et al., "Generational Growth." [↑](#footnote-ref-25)
      expected_output:
        footnotes:
          - marker: "18"
            text: "Bistline et al., \"Emissions and Energy Impacts of the Inflation Reduction Act\"; North American Electric Reliability Corporation (NERC), 2024 Long-Term Reliability Assessment; Pilz, Mahmood, and Heim, AI's Power Requirements Under Exponential Growth."
            reference_code: "#footnote-ref-18"
          - marker: "19"
            text: "Srivathsan et al., \"AI Power\"; Scharre, Future-Proofing Frontier AI Regulation."
            reference_code: "#footnote-ref-19"
          - marker: "20"
            text: "Secretary of Energy Advisory Board, \"Recommendations on Powering Artificial Intelligence and Data Center Infrastructure.\""
            reference_code: "#footnote-ref-20"
          - marker: "21"
            text: "Sevilla et al., \"Can AI Scaling Continue Through 2030?\""
            reference_code: "#footnote-ref-21"
          - marker: "22"
            text: "Pilz, Mahmood, and Heim, AI's Power Requirements Under Exponential Growth."
            reference_code: "#footnote-ref-22"
          - marker: "23"
            text: "Shehabi et al., 2024 United States Data Center Energy Usage Report."
            reference_code: "#footnote-ref-23"
          - marker: "24"
            text: "LNBL assumed an average capacity utilization rate of 50 percent to translate energy (TWh) to capacity (GW)."
            reference_code: "#footnote-ref-24"
          - marker: "25"
            text: "Davenport et al., \"Generational Growth.\""
            reference_code: "#footnote-ref-25"

    - name: "footnote_with_special_characters"
      description: "Test footnote with special characters and punctuation"
      input:
        text: |
          160. Text content here with special characters: "quotes", (parentheses), [brackets], and #hashtags. [↑](#footnote-ref-161)
      expected_output:
        footnotes:
          - marker: "160"
            text: "Text content here with special characters: \"quotes\", (parentheses), [brackets], and #hashtags."
            reference_code: "#footnote-ref-161"

    - name: "footnote_long_text"
      description: "Test footnote with very long text content"
      input:
        text: |
          1. This is a very long footnote that contains extensive text content. It includes multiple sentences and paragraphs worth of information. The purpose is to test that the agent can handle footnotes with substantial content without truncation or errors. It should extract the entire text content properly. [↑](#footnote-ref-1)
      expected_output:
        footnotes:
          - marker: "1"
            text: "This is a very long footnote that contains extensive text content. It includes multiple sentences and paragraphs worth of information. The purpose is to test that the agent can handle footnotes with substantial content without truncation or errors. It should extract the entire text content properly."
            reference_code: "#footnote-ref-1"

    - name: "footnote_mixed_formats"
      description: "Test extraction with mixed footnote formats in same section"
      input:
        text: |
          1. Standard numbered format footnote. [↑](#footnote-ref-1)
          [2] Bracketed format footnote.
          ^3 Caret format footnote. [↑](#footnote-ref-3)
          4. Back to numbered format.
      expected_output:
        footnotes:
          - marker: "1"
            text: "Standard numbered format footnote."
            reference_code: "#footnote-ref-1"
          - marker: "2"
            text: "Bracketed format footnote."
            reference_code: null
          - marker: "3"
            text: "Caret format footnote."
            reference_code: "#footnote-ref-3"
          - marker: "4"
            text: "Back to numbered format."
            reference_code: null

    - name: "footnote_empty_section"
      description: "Test handling of empty footnote section"
      input:
        text: ""
      expected_output:
        footnotes: []

    - name: "footnote_whitespace_only"
      description: "Test handling of whitespace-only section"
      input:
        text: |
          
          
          
      expected_output:
        footnotes: []

    - name: "footnote_single_digit"
      description: "Test extraction of single-digit footnote markers"
      input:
        text: |
          1. First footnote.
          2. Second footnote.
          3. Third footnote.
      expected_output:
        footnotes:
          - marker: "1"
            text: "First footnote."
            reference_code: null
          - marker: "2"
            text: "Second footnote."
            reference_code: null
          - marker: "3"
            text: "Third footnote."
            reference_code: null

    - name: "footnote_large_numbers"
      description: "Test extraction of footnotes with large marker numbers"
      input:
        text: |
          160. Large number footnote one. [↑](#footnote-ref-160)
          161. Large number footnote two. [↑](#footnote-ref-161)
          200. Even larger number. [↑](#footnote-ref-200)
      expected_output:
        footnotes:
          - marker: "160"
            text: "Large number footnote one."
            reference_code: "#footnote-ref-160"
          - marker: "161"
            text: "Large number footnote two."
            reference_code: "#footnote-ref-161"
          - marker: "200"
            text: "Even larger number."
            reference_code: "#footnote-ref-200"

    - name: "footnote_with_urls"
      description: "Test footnote containing URLs"
      input:
        text: |
          1. See https://www.example.com for more information. [↑](#footnote-ref-1)
          2. Reference: http://example.org/path/to/resource [↑](#footnote-ref-2)
      expected_output:
        footnotes:
          - marker: "1"
            text: "See https://www.example.com for more information."
            reference_code: "#footnote-ref-1"
          - marker: "2"
            text: "Reference: http://example.org/path/to/resource"
            reference_code: "#footnote-ref-2"

    - name: "footnote_complex_multiline"
      description: "Test complex multiline footnote with various content"
      input:
        text: |
          42. This is a complex footnote that spans
          multiple lines. It includes various elements:
          - Bullet points
          - More content
          - And even more details
          All merged into one footnote entry. [↑](#footnote-ref-42)
      expected_output:
        footnotes:
          - marker: "42"
            text: "This is a complex footnote that spans multiple lines. It includes various elements: - Bullet points - More content - And even more details All merged into one footnote entry."
            reference_code: "#footnote-ref-42"

