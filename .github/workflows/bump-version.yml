name: Bump Version

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'CHANGELOG.md'
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: 'patch'

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Bump version and push tag
        uses: phips28/gh-action-bump-version@master
        with:
          tag-prefix: "v"
          default: ${{ github.event.inputs.bump_type || 'patch' }}
          minor-wording: "minor"
          major-wording: "major"
          patch-wording: "patch"
          commit-message: "chore: bump version to {{version}}"
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          PACKAGEJSON_DIR: "frontend"
