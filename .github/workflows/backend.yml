on: [pull_request]

jobs:
  lint:
    name: black formatter
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: reviewdog/action-black@v3.22.4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-check
          level: error

  test:
    name: pytest (unit & integration)
    runs-on: ubuntu-latest
    continue-on-error: true  # Warning only, don't fail the workflow

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: |
          uv run pytest tests/ --tb=short
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Comment test results on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let testResults = 'Test results not available';
            
            try {
              const results = JSON.parse(fs.readFileSync('test_results.json', 'utf8'));
              const summary = results.summary;
              const passed = summary.passed || 0;
              const failed = summary.failed || 0;
              const total = summary.total || 0;
              
              testResults = `### 🧪 Test Results
              
              - **Total**: ${total} tests
              - **Passed**: ✅ ${passed}
              - **Failed**: ❌ ${failed}
              
              ${failed > 0 ? '⚠️ Some tests are failing but this is informational only.' : '✅ All tests passing!'}`;
            } catch (e) {
              testResults = '⚠️ Could not parse test results';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: testResults
            });
