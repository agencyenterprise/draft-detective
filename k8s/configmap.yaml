apiVersion: v1
kind: ConfigMap
metadata:
  name: api-config
data:
  POSTGRES_HOST: "db"
  POSTGRES_PORT: "5432"
  FILE_UPLOADS_MOUNT_PATH: "/app/uploads"
  LANGFUSE_HOST: "https://cloud.langfuse.com"
  
  # File converter configuration
  # Main document converter (docling recommended for proper heading extraction)
  MAIN_FILE_CONVERTER: "docling"
  # Supporting documents converter (markitdown for faster processing)
  SUPPORTING_FILE_CONVERTER: "markitdown"
  DOCLING_SERVE_API_URL: "http://docling-serve:5001"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
data:
  NODE_ENV: "production"
  NEXT_PUBLIC_API_URL: "http://api:8000"
  # PostHog Analytics - Replace with your actual values
  # NEXT_PUBLIC_POSTHOG_KEY: "phc_your_project_key_here"
  # NEXT_PUBLIC_POSTHOG_HOST: "https://us.i.posthog.com"

