[build]
builder = "dockerfile"

[deploy]
startCommand = "node server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 300
restartPolicyType = "always"

[env]
NODE_ENV = "production"
NEXT_PUBLIC_API_URL = "https://${{ai-reviewer-api.RAILWAY_PUBLIC_DOMAIN}}"
# PostHog Analytics - Set these in Railway dashboard as environment variables
# NEXT_PUBLIC_POSTHOG_KEY = "phc_your_project_key_here"
# NEXT_PUBLIC_POSTHOG_HOST = "https://us.i.posthog.com"
# Experimental Features - Set to "true" to show experimental workflows (Live Reports, etc.)
# NEXT_PUBLIC_SHOW_EXPERIMENTAL_FEATURES = "false"
